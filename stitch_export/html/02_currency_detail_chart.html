<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orbit - Currency Detail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-tertiary-container": "#636468",
                "on-surface": "#e4e2e4",
                "primary-fixed": "#c6f24e",
                "surface-dim": "#131315",
                "on-secondary-container": "#b6b4b7",
                "background": "#131315",
                "primary-container": "#c6f24e",
                "tertiary-container": "#e3e2e6",
                "tertiary-fixed": "#e3e2e6",
                "on-background": "#e4e2e4",
                "surface-container": "#1f1f21",
                "on-primary-fixed-variant": "#3a4d00",
                "on-tertiary": "#2f3034",
                "surface": "#131315",
                "outline": "#8e937c",
                "on-primary": "#273500",
                "surface-container-high": "#2a2a2c",
                "secondary-container": "#474649",
                "on-surface-variant": "#c4c9b0",
                "secondary": "#c8c6c8",
                "secondary-fixed": "#e4e2e4",
                "surface-container-low": "#1b1b1d",
                "secondary-fixed-dim": "#c8c6c8",
                "surface-container-highest": "#353437",
                "on-error-container": "#ffdad6",
                "on-secondary-fixed": "#1b1b1d",
                "primary": "#ffffff",
                "error": "#ffb4ab",
                "inverse-surface": "#e4e2e4",
                "on-primary-container": "#536d00",
                "on-secondary": "#303032",
                "tertiary": "#ffffff",
                "error-container": "#93000a",
                "on-tertiary-fixed-variant": "#46474a",
                "surface-variant": "#353437",
                "inverse-on-surface": "#303032",
                "tertiary-fixed-dim": "#c6c6ca",
                "surface-container-lowest": "#0e0e10",
                "outline-variant": "#444936",
                "surface-bright": "#39393b",
                "on-error": "#690005",
                "on-tertiary-fixed": "#1a1c1f",
                "inverse-primary": "#4f6700",
                "surface-tint": "#abd533",
                "primary-fixed-dim": "#abd533",
                "on-secondary-fixed-variant": "#474649",
                "on-primary-fixed": "#151f00"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "xs": "8px",
                "container-margin": "20px",
                "md": "16px",
                "base": "4px",
                "gutter": "12px",
                "xl": "32px",
                "sm": "12px",
                "lg": "24px"
            },
            "fontFamily": {
                "body-lg": ["Inter"],
                "headline-md": ["Inter"],
                "body-md": ["Inter"],
                "numeral-xl": ["JetBrains Mono"],
                "numeral-md": ["JetBrains Mono"],
                "label-sm": ["Inter"],
                "headline-lg": ["Inter"],
                "headline-lg-mobile": ["Inter"]
            },
            "fontSize": {
                "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "numeral-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.04em", "fontWeight": "500"}],
                "numeral-md": ["18px", {"lineHeight": "24px", "fontWeight": "500"}],
                "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #131315;
            color: #e4e2e4;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chart-container {
            mask-image: linear-gradient(to right, black 90%, transparent 100%);
        }
        .active-tab-glow {
            box-shadow: 0 0 15px rgba(198, 242, 78, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Top AppBar (JSON Derived Structure) -->
<header class="fixed top-0 z-50 w-full bg-background dark:bg-background border-b border-surface-container-highest flex justify-between items-center h-16 px-container-margin">
<div class="flex items-center gap-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="flex items-center gap-xs">
<div class="w-6 h-6 rounded-full overflow-hidden border border-surface-container-highest">
<img class="w-full h-full object-cover" data-alt="A macro close-up of a European Union flag texture, showing detailed fabric weave in deep royal blue with golden-yellow stars. The lighting is cinematic and focused, with a slight depth of field blurring the background. The aesthetic is clean and professional, matching a high-end financial application interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDTfB01EZWS8XpAr2x-jY744jqSGgIeo9ar6YXMDERXb9Lbj8aJeGKEQR86aPs8qaKwfb_cM78jFxMhRms25MF0zz0rnWCq02VCAJTMxqxkJcbCEeIYXNF9AniFJMoAOTPH8FF_zDtEmBtmm_j7DAqvpGkM1E5_zTrCDEVKLz_dpoLmoO247Os8G5VuGlugQuz5DkBdloMJhdfBUqLFEt9RCscMEDSkQpfOUEv15p6Rg46IuAqhdyIVMoPaWeArWqvOuklHcgp6OA"/>
</div>
<h1 class="text-headline-md font-headline-md font-bold text-on-surface">EUR</h1>
</div>
</div>
<div class="flex flex-col items-end">
<span class="text-label-sm font-label-sm text-on-surface-variant">Live Rate</span>
<span class="text-numeral-md font-numeral-md text-primary-fixed">1.0852</span>
</div>
</header>
<main class="mt-16 flex-grow p-container-margin space-y-xl pb-24">
<!-- Hero Conversion Stat -->
<section class="flex flex-col space-y-base">
<div class="flex items-baseline gap-xs">
<span class="text-label-sm font-label-sm text-on-surface-variant">1 USD =</span>
<h2 class="text-numeral-xl font-numeral-xl text-on-surface">0.92</h2>
<span class="text-headline-md font-headline-md text-on-surface">EUR</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary-fixed text-md" style="font-variation-settings: 'FILL' 1;">trending_up</span>
<span class="text-label-sm font-label-sm text-primary-fixed">+0.24% today</span>
</div>
</section>
<!-- Chart Section -->
<section class="relative bg-surface-container-low border border-surface-container-highest rounded-xl p-md overflow-hidden h-64">
<!-- Simple SVG Chart Representation -->
<div class="absolute inset-0 pt-lg">
<svg class="w-full h-full preserve-3d" viewbox="0 0 400 150">
<defs>
<lineargradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#c6f24e" stop-opacity="0.2"></stop>
<stop offset="100%" stop-color="#c6f24e" stop-opacity="0"></stop>
</lineargradient>
</defs>
<path d="M0,120 Q50,110 80,130 T150,90 T220,100 T300,40 T400,20 L400,150 L0,150 Z" fill="url(#chartGradient)"></path>
<path d="M0,120 Q50,110 80,130 T150,90 T220,100 T300,40 T400,20" fill="none" stroke="#c6f24e" stroke-linecap="round" stroke-width="3"></path>
<!-- Baseline -->
<line stroke="#2A2A2C" stroke-dasharray="4" stroke-width="1" x1="0" x2="400" y1="140" y2="140"></line>
</svg>
</div>
<!-- Chart Tooltip Interaction Point -->
<div class="absolute left-3/4 top-1/4 flex flex-col items-center">
<div class="w-3 h-3 bg-primary-fixed rounded-full shadow-[0_0_8px_#c6f24e]"></div>
<div class="mt-xs bg-surface-container-high border border-surface-container-highest px-xs py-1 rounded-lg">
<span class="text-numeral-md font-numeral-md text-primary-fixed">0.923</span>
</div>
</div>
</section>
<!-- Timeframe Selector -->
<section class="flex bg-surface-container-low border border-surface-container-highest rounded-full p-1">
<button class="flex-1 py-xs text-label-sm font-label-sm text-on-surface-variant hover:text-on-surface transition-colors">1D</button>
<button class="flex-1 py-xs text-label-sm font-label-sm text-on-surface-variant hover:text-on-surface transition-colors">1W</button>
<button class="flex-1 py-xs text-label-sm font-label-sm bg-primary-fixed text-on-primary-fixed rounded-full active-tab-glow">1M</button>
<button class="flex-1 py-xs text-label-sm font-label-sm text-on-surface-variant hover:text-on-surface transition-colors">6M</button>
<button class="flex-1 py-xs text-label-sm font-label-sm text-on-surface-variant hover:text-on-surface transition-colors">1Y</button>
<button class="flex-1 py-xs text-label-sm font-label-sm text-on-surface-variant hover:text-on-surface transition-colors">ALL</button>
</section>
<!-- Key Statistics Bento-ish Grid -->
<section class="grid grid-cols-3 gap-gutter">
<div class="bg-surface-container p-md rounded-xl border border-surface-container-highest flex flex-col gap-xs">
<span class="text-label-sm font-label-sm text-on-surface-variant">High</span>
<span class="text-numeral-md font-numeral-md text-on-surface">0.928</span>
</div>
<div class="bg-surface-container p-md rounded-xl border border-surface-container-highest flex flex-col gap-xs">
<span class="text-label-sm font-label-sm text-on-surface-variant">Low</span>
<span class="text-numeral-md font-numeral-md text-on-surface">0.894</span>
</div>
<div class="bg-surface-container p-md rounded-xl border border-surface-container-highest flex flex-col gap-xs">
<span class="text-label-sm font-label-sm text-on-surface-variant">% Change</span>
<span class="text-numeral-md font-numeral-md text-primary-fixed">+3.2%</span>
</div>
</section>
<!-- Market Sentiment/Insights -->
<section class="bg-primary-fixed/5 border border-primary-fixed/20 p-lg rounded-xl flex items-start gap-md">
<div class="bg-primary-fixed/10 p-sm rounded-lg">
<span class="material-symbols-outlined text-primary-fixed" style="font-variation-settings: 'FILL' 1;">insights</span>
</div>
<div class="space-y-xs">
<h3 class="text-label-sm font-label-sm text-primary-fixed uppercase tracking-wider">Orbit Insight</h3>
<p class="text-body-md font-body-md text-on-surface">Euro remains strong against the Dollar following the recent ECB announcement. Market volatility is expected to decrease over the next 48 hours.</p>
</div>
</section>
</main>
<!-- Bottom Navigation (JSON Derived) -->
<!-- Determined 'show_chart' as active based on Currency Detail context -->
<nav class="fixed bottom-0 w-full z-50 bg-surface-container-lowest border-t border-surface-container-highest flex justify-around items-center px-lg py-xs rounded-t-xl">
<button class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-12 hover:text-primary-fixed transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">sync_alt</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-fixed text-on-primary-fixed rounded-full w-12 h-12 active:scale-90 duration-200">
<span class="material-symbols-outlined">show_chart</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant w-12 h-12 hover:text-primary-fixed transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">settings</span>
</button>
</nav>
<script>
        // Simple touch feedback and interaction handling
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('scale-95');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('scale-95');
            });
        });

        // Toggle timeframe selection logic
        const timeframeBtns = document.querySelectorAll('section:nth-of-type(3) button');
        timeframeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                timeframeBtns.forEach(b => {
                    b.classList.remove('bg-primary-fixed', 'text-on-primary-fixed', 'rounded-full', 'active-tab-glow');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('bg-primary-fixed', 'text-on-primary-fixed', 'rounded-full', 'active-tab-glow');
                btn.classList.remove('text-on-surface-variant');
            });
        });
    </script>
</body></html>
