<!-- Bottom Navigation Shell (As prescribed by JSON) -->
<!-- Shell Relevance: Sub-page (Add Currency), we suppress BottomNavBar for focus according to UX rules -->
<!-- However, providing the container for fixed elements if needed -->
<!-- Subtle Floating Action Gradient for Depth -->
<div class="fixed bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-background to-transparent pointer-events-none"></div>
<script>
        // Micro-interaction for currency selection
        document.querySelectorAll('.row-active').forEach(row => {
            row.addEventListener('click', function() {
                const btn = this.querySelector('button');
                const icon = btn.querySelector('span');
                
                if (icon.innerText === 'add') {
                    // Visual feedback for addition
                    icon.innerText = 'check';
                    btn.classList.remove('text-primary-fixed', 'border-primary-fixed');
                    btn.classList.add('bg-primary-fixed', 'text-on-primary-fixed', 'border-primary-fixed');
                } else {
                    icon.innerText = 'add';
                    btn.classList.add('text-primary-fixed', 'border-primary-fixed');
                    btn.classList.remove('bg-primary-fixed', 'text-on-primary-fixed');
                }
            });
        });

        // Search highlight effect
        const searchInput = document.querySelector('input');
        const searchContainer = searchInput.closest('div');
        
        searchInput.addEventListener('focus', () => {
            searchContainer.classList.add('bg-surface-container-highest');
        });
        
        searchInput.addEventListener('blur', () => {
            searchContainer.classList.remove('bg-surface-container-highest');
        });
    </script>
