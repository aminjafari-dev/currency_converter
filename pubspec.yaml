name: currency_converter
description: Nerkhak — a dark, modern currency converter built with Clean Architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  freezed_annotation: ^3.0.0
  dartz: ^0.10.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  dio: ^5.7.0
  connectivity_plus: ^6.1.3
  shared_preferences: ^2.5.2
  gap: ^3.0.1
  fl_chart: ^0.70.2
  country_flags: ^3.2.0
  intl: any
  google_fonts: ^6.2.1
  animated_notch_bottom_bar: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.3

# Generates Android / iOS launcher icons from the brand mark.
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.jpeg
  # Matches the charcoal square behind the lime mark in logo.jpeg.
  adaptive_icon_background: '#121212'
  adaptive_icon_foreground: assets/images/logo.jpeg
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  # Far Homa — Persian/Iranian UI text when locale is `fa`.
  fonts:
    - family: FarHoma
      fonts:
        - asset: assets/font/Far_Homa/Far_Homa.ttf

